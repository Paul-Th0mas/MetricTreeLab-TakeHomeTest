services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/outreach?schema=public
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - app-net

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=outreach
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d outreach"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  mailpit:
    image: axllent/mailpit
    restart: always
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - app-net

volumes:
  pgdata:

networks:
  app-net:
    driver: bridge